<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Odin Calculator</title>
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <div class='container'>
      <div class='display'>
        <output>0</output>
      </div>
      <div>
        <div>
          <button type="">7</button>
          <button type="">8</button>
          <button type="">9</button>
          <button type="">/</button>
        </div>
        <div>
          <button type="">4</button>
          <button type="">5</button>
          <button type="">6</button>
          <button type="">*</button>
        </div>
        <div>
          <button type="">1</button>
          <button type="">2</button>
          <button type="">3</button>
          <button type="">-</button>
        </div>
        <div>
          <button type="">0</button>
          <button type="">.</button>
          <button type="">+</button>
          <button type="">=</button>
        </div>
      </div>
    </div>
  </body>
</html>
