<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Odin Calculator</title>
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <div class='container'>
      <div class='display'>
        <output>0</output>
      </div>
      <div class='btn'>
        <div >
          <button type="" id="0" >Clr</button>
          <button type="" id="decimal-point" >Del</button>
          <button type="" id="plus" >%</button>
          <button type="" id="equals" >/</button>
        </div>     
        <div >
          <button type="" id="seven">7</button>
          <button type="" id="eight">8</button>
          <button type="" id="nine">9</button>
          <button type="" id="divide" >*</button>
        </div>
        <div >
          <button type="" id="four">4</button>
          <button type="" id="five">5</button>
          <button type="" id="six">6</button>
          <button type="" id="multiply" >-</button>
        </div>
        <div >
          <button type="" id="one">1</button>
          <button type="" id="two">2</button>
          <button type="" id="three">3</button>
          <button type="" id="minus">+</button>
        </div>
        <div >
          <button type="" id="one">0</button>
          <button type="" id="two">.</button>
          <button type="" id="three" class="operations">=</button>
        </div>  
      </div>
    </div>
  </body>
</html>
